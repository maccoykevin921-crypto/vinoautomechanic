<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OEMlink Parts™</title>

<style>
body {
    background: #1C1C1E;
    color: #FFFAFA;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 400px;
    margin: auto;
    background: #000;
    padding: 30px;
    border-radius: 20px;
}

h1 {
    color: #8B0000;
}

input {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    background: #8B0000;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #a00000;
}

.result {
    margin-top: 20px;
    font-size: 16px;
}
</style>

</head>

<body>

<div class="container">
    <h1>OEMlink Parts™</h1>
    <p>Find Exact Spare Parts Using VIN – No Guesswork</p>

    <input type="text" id="vinInput" placeholder="Enter VIN Number">

    <button onclick="findParts()">Find My Parts</button>

    <div class="result" id="result"></div>
</div>

<script>
async function findParts() {
    const vin = document.getElementById("vinInput").value;
    const resultBox = document.getElementById("result");

    if (!vin) {
        resultBox.innerHTML = "⚠️ Please enter a VIN";
        return;
    }

    resultBox.innerHTML = "⏳ Checking VIN...";

    try {
        const response = await fetch("https://vino-vin-proxy-x3zd.onrender.com/api/vin?vin=" + vin);
        const data = await response.json();

        if (data.error) {
            resultBox.innerHTML = "❌ VIN decode failed";
        } else {
            resultBox.innerHTML = `
                ✅ VIN Verified<br><br>
                🚗 ${data.make} ${data.model}<br>
                📅 Year: ${data.year}<br>
                ⚙️ Engine: ${data.engine}<br><br>
                <button onclick="orderParts('${vin}')">Order Parts on WhatsApp</button>
            `;
        }

    } catch (error) {
        resultBox.innerHTML = "❌ Server error. Try again.";
    }
}

function orderParts(vin) {
    const message = encodeURIComponent("Hello Vino Auto Mechanic, I need parts for VIN: " + vin);
    window.open("https://wa.me/27712345678?text=" + message, "_blank");
}
</script>

</body>
</html>
