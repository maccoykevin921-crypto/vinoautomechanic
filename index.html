<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OEMlink Parts™</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1C1C1E;
    color: #FFFAFA;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    width: 90%;
    max-width: 400px;
    background: #000;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
}
input {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: #2c2c2e;
    color: white;
}
button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    background: #8B0000;
    border: none;
    border-radius: 10px;
    color: white;
}
#result {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">
    <h2>OEMlink Parts™</h2>

    <input id="vin" placeholder="Enter VIN">

    <button onclick="checkVIN()">Find My Parts</button>

    <div id="result"></div>
</div>

<script>
async function checkVIN() {
    const vin = document.getElementById("vin").value;
    const result = document.getElementById("result");

    result.innerHTML = "Checking...";

    try {
        const res = await fetch("https://vino-vin-proxy-x3zd.onrender.com/api/vin?vin=" + vin);
        const data = await res.json();

        result.innerHTML =
            "✅ " + data.make + " " + data.model + "<br>" +
            "Year: " + data.year + "<br>" +
            "Engine: " + data.engine;

    } catch (e) {
        result.innerHTML = "❌ Failed to fetch VIN";
    }
}
</script>

</body>
</html>
