<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OEMlink Parts™</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1C1C1E;
    color: #FFFAFA;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 400px;
    background: #000;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    color: #8B0000;
    margin-bottom: 10px;
}

p {
    color: #ccc;
    font-size: 14px;
}

input {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    background: #2c2c2e;
    color: white;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    background: #8B0000;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #a00000;
}

#result {
    margin-top: 20px;
    font-size: 15px;
    color: #FFFAFA;
}
</style>
</head>

<body>

<div class="container">
    <h1>OEMlink Parts™</h1>
    <p>Find Exact Spare Parts Using VIN – No Guesswork</p>

    <input type="text" id="vinInput" placeholder="Enter VIN Number">

    <button onclick="findParts()">Find My Parts</button>

    <div id="result"></div>
</div>

<script>
async function findParts() {
    const vin = document.getElementById("vinInput").value;
    const resultBox = document.getElementById("result");

    if (!vin) {
        resultBox.innerHTML = "⚠️ Enter VIN first";
        return;
    }

    resultBox.innerHTML = "🔄 Checking VIN...";

    try {
        const res = await fetch("https://vino-vin-proxy-x3zd.onrender.com/api/vin?vin=" + vin);
        const data = await res.json();

        resultBox.innerHTML = `
            ✅ ${data.make} ${data.model}<br>
            Year: ${data.year}<br>
            Engine: ${data.engine}
        `;
    } catch (error) {
        resultBox.innerHTML = "❌ Error connecting to server";
    }
}
</script>

</body>
</html>
